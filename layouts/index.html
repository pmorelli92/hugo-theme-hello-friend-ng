{{ define "main" }}
    <div id="home-center">

        {{- with .Site.Params.logoForIndex }}
            <img class="indexLogo" src="{{ $.Site.Params.logoForIndex }}" alt="" />
        {{- end }}

        {{- with .Site.Params.social }}
            <div id="home-social">
                {{ partialCached "social-icons.html" . }}
            </div>
        {{- end }}
    </div>
{{ end }}
